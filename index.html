<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Dhrubo">
    <title>মায়ের দোয়া IP TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --sidebar: #1e293b; 
            --primary: #00b4d8; 
            --accent: #e63946;
            --border: #334155; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --glow: #ff6b9d;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            color: var(--text); 
            user-select: none;
            -webkit-user-select: none;
        }
        
        header { 
            height: 65px;
            padding: 15px 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #1e293b; 
            z-index: 10;
        }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--text); letter-spacing: -0.5px; }
        .logo span.highlight { color: var(--glow); text-shadow: 0 0 10px rgba(255,107,157,0.5); }
        .logo span.highlight2 { color: var(--primary); }
        
        .controls-group { display: flex; gap: 12px; }
        .btn-action { 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 700; 
            outline: none;
            transition: background 0.2s;
        }
        .btn-action:focus, .btn-action:hover {
            background: #0096b4;
            outline: 2px solid #fff;
        }
        .btn-fullscreen { background: var(--accent); }
        .btn-fullscreen:focus, .btn-fullscreen:hover { background: #cc2a36; }

        .search-box {
            background: #0f172a;
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 8px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            width: 200px;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--primary); }
        .search-box::placeholder { color: var(--text-muted); }

        main { 
            display: flex;
            flex: 1; 
            width: 100%;
            height: calc(100vh - 106px);
            overflow: hidden;
        }

        .player-section { 
            flex: 1;
            padding: 20px; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            justify-content: center;
            height: 100%;
        }
        
        .video-container { 
            position: relative;
            background: #000; 
            width: 100%; 
            max-height: 80vh;
            aspect-ratio: 16/9; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 2px solid var(--border);
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0,0,0);
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .audio-alert-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 11;
        }
        .audio-alert-btn {
            background: var(--accent);
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
        }
        .audio-alert-btn:focus, .audio-alert-btn:hover {
            background: #fff;
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        .sidebar { 
            width: 380px;
            background: var(--sidebar); 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            overflow: hidden;
        }
        .sidebar-title { padding: 20px; font-weight: 700; border-bottom: 1px solid var(--border); font-size: 1.1rem; letter-spacing: 0.5px; }
        
        .ch-list { 
            flex: 1; 
            overflow-y: scroll; 
            padding: 15px; 
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .ch-list::-webkit-scrollbar { width: 6px; }
        .ch-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .ch-card { 
            padding: 14px 18px; 
            margin-bottom: 10px; 
            background: #0f172a; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .ch-info-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ch-logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .ch-card .ch-num {
            background: var(--border);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        
        .ch-card:focus, .ch-card:hover { 
            border-color: var(--primary); 
            background: #25334a;
            outline: 2px solid var(--primary);
        }
        .ch-card.active { 
            border-color: var(--glow); 
            color: #fff; 
            background: rgba(255, 107, 157, 0.2); 
        }
        .ch-card.active:focus { outline: 2px solid var(--glow); }
        .ch-card.active .ch-num { background: var(--glow); color: #fff; }

        .footer-text {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: var(--glow);
            background: #1e293b;
            border-top: 1px solid var(--border);
            letter-spacing: 1px;
        }

        footer { height: 41px; padding: 12px 25px; border-top: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; background: #1e293b; color: var(--text-muted); z-index: 10; }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            main { flex-direction: column; height: auto; overflow: visible; }
            .sidebar { width: 100%; height: 400px; border-left: none; border-top: 1px solid var(--border); }
            .video-container { max-height: none; }
        }
        @media (max-width: 640px) {
            header { padding: 12px 15px; flex-direction: column; gap: 10px; align-items: flex-start; height: auto; }
            main { height: auto; }
            .controls-group { width: 100%; justify-content: space-between; }
            .player-section { padding: 10px; }
            .logo { font-size: 1.1rem; }
            .btn-action { padding: 8px 14px; font-size: 12px; }
            .search-box { width: 100%; }
        }
    </style>
</head>

</main>

<footer>

</footer>

    const video = document.getElementById('video');
    const vContainer = document.getElementById('videoContainer');
    const audioOverlay = document.getElementById('audioOverlay');
    const audioPromptBtn = document.getElementById('audioPromptBtn');
    const chList = document.getElementById('channelList');
    const label = document.getElementById('playing-now');
    let hls = null;
    let currentIdx = 0;
    let filteredChannels = [...channels];

    function renderChannels(chs) {
        chList.innerHTML = "";
        chs.forEach((ch, idx) => {
            const originalIdx = channels.indexOf(ch);
            const card = document.createElement('div');
            card.className = 'ch-card';
            card.id = `ch-${originalIdx + 1}`;
            card.tabIndex = "0"; 
            card.innerHTML = `
                <div class="ch-info-meta">
                    <img class="ch-logo-img" src="${ch.logo}" alt="" onerror="this.style.display='none'">
                    <span>${ch.name}</span>
                </div>
                <span class="ch-num">CH ${originalIdx + 1}</span>
            `;
            card.onclick = function() { switchCh(originalIdx); };
            if (originalIdx === currentIdx) card.classList.add('active');
            chList.appendChild(card);
        });
    }

    function filterChannels() {
        const query = document.getElementById('searchBox').value.toLowerCase().trim();
        if (!query) {
            filteredChannels = [...channels];
        } else {
            filteredChannels = channels.filter(ch => ch.name.toLowerCase().includes(query));
        }
        renderChannels(filteredChannels);
    }

    function switchCh(index) {
        if(index < 0 || index >= channels.length) return;
        currentIdx = index;
        const targetCh = channels[index];

        document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('active'));
        
        const activeCard = document.getElementById(`ch-${index + 1}`);
        if(activeCard) {
            activeCard.classList.add('active');
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            setTimeout(() => { activeCard.focus(); }, 50); 
        }
        
        label.innerHTML = `<span style="color:#fff">Watching:</span> ${targetCh.name} (Ch ${index + 1})`;

        if (hls) {
            hls.destroy();
            hls = null;
        }

        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 10,
                maxMaxBufferLength: 20,
                enableWorker: true
            });
            hls.loadSource(targetCh.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { attemptAutoplay(); });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.warn('Network error, trying to recover...');
                            hls.startLoad();
